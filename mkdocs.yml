site_name: ggrepel_py
use_directory_urls: false
theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
  - mkdocs-jupyter:
      include_source: true

nav:
  - Home: index.md
  - Tutorials:
    - Getting started: tutorials/ggrepel.ipynb
    - Examples (V2): tutorials/examples_v2.ipynb
  - API Reference: api.md
